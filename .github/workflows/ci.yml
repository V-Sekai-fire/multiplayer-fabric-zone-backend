name: Zone Backend CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: zone-backend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: mix test
    runs-on: ubuntu-latest

    env:
      MIX_ENV: test
      TEST_DATABASE_URL: "postgresql://root@localhost:26257/vsekai_test?sslmode=verify-full"
      CRDB_CA_CERT: /tmp/crdb-certs/ca.crt
      CRDB_CLIENT_CERT: /tmp/crdb-certs/client.root.crt
      CRDB_CLIENT_KEY: /tmp/crdb-certs/client.root.key

    steps:
      - uses: actions/checkout@v4

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.17"
          otp-version: "27"

      - name: Cache Mix deps
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-zone-backend-mix-${{ hashFiles('mix.lock') }}
          restore-keys: ${{ runner.os }}-zone-backend-mix-

      - name: Generate CockroachDB certificates
        run: |
          mkdir -p /tmp/crdb-certs
          docker run --rm --user 0:0 \
            --entrypoint /bin/sh \
            -v /tmp/crdb-certs:/certs \
            ghcr.io/v-sekai/cockroach:latest -c "
              cockroach cert create-ca --certs-dir=/certs --ca-key=/certs/ca.key --allow-ca-key-reuse --lifetime=87600h
              cockroach cert create-node localhost crdb 127.0.0.1 ::1 --certs-dir=/certs --ca-key=/certs/ca.key --lifetime=87600h
              cockroach cert create-client root --certs-dir=/certs --ca-key=/certs/ca.key --lifetime=87600h
              chmod 644 /certs/*.crt /certs/*.key
            "

      - name: Start CockroachDB
        run: |
          docker run -d --name crdb \
            -p 26257:26257 -p 8080:8080 \
            -v /tmp/crdb-certs:/certs:ro \
            ghcr.io/v-sekai/cockroach:latest \
            start-single-node --certs-dir=/certs \
            --listen-addr=0.0.0.0:26257 \
            --http-addr=0.0.0.0:8080
          until docker exec crdb cockroach sql --certs-dir=/certs -e "SELECT 1" 2>/dev/null; do
            sleep 1
          done

      - name: Create test database
        run: docker exec crdb cockroach sql --certs-dir=/certs -e "CREATE DATABASE IF NOT EXISTS vsekai_test;"

      - name: Install dependencies
        run: mix deps.get

      - name: Compile
        run: mix compile --warnings-as-errors

      - name: Check formatting
        run: mix format --check-formatted

      - name: Run tests
        run: |
          mix ecto.migrate
          mix run priv/repo/test_seeds.exs
          mix test --trace
