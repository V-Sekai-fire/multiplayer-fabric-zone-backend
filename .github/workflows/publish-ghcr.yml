name: Build and publish Docker image (GHCR)

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/v-sekai/uro
  IMAGE_FRONTEND: ghcr.io/v-sekai/uro-frontend

jobs:
  uro:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            os: ubuntu-latest
          - platform: linux/arm64
            os: ubuntu-24.04-arm

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and (conditionally) push uro image
        id: build
        uses: docker/build-push-action@v4
        with:
          context: .
          file: Dockerfile
          platforms: ${{ matrix.platform }}
          push: ${{ github.ref == 'refs/heads/master' && github.event_name == 'push' }}
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}

      # Build and push the frontend image, referencing the uro image we just built
      - name: Build and (conditionally) push frontend image
        if: ${{ github.ref == 'refs/heads/master' && github.event_name == 'push' }}
        id: build-frontend
        uses: docker/build-push-action@v4
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          build-args: |
            uro_image=${{ env.IMAGE }}:${{ github.sha }}
          tags: |
            ${{ env.IMAGE_FRONTEND }}:latest
            ${{ env.IMAGE_FRONTEND }}:${{ github.sha }}

      - name: Show resulting image info
        if: always()
        run: |
          echo "IMAGE=${{ env.IMAGE }}"
          echo "PUSHED=${{ github.ref == 'refs/heads/master' && github.event_name == 'push' }}"
          echo "TAGS=latest,${{ github.sha }}"
