app            = "multiplayer-fabric-uro"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  MIX_ENV = "prod"
  PORT    = "4000"

# Override the Dockerfile ENTRYPOINT so we can write CRDB certs to disk first.
# scripts/fly-start.sh reads CRDB_CA_CRT / CRDB_CLIENT_WRITER_CRT / CRDB_CLIENT_WRITER_KEY
# from Fly secrets, writes them to /tmp/crdb_certs/, sets CRDB_CA_CERT etc., then
# starts the application.
[processes]
  app = "/bin/sh /app/scripts/fly-start.sh"

[http_service]
  internal_port        = 4000
  force_https          = true
  auto_stop_machines   = true
  auto_start_machines  = true
  min_machines_running = 1
  processes            = ["app"]

  [http_service.concurrency]
    type       = "connections"
    soft_limit = 200
    hard_limit = 250

[[vm]]
  memory   = "512mb"
  cpu_kind = "shared"
  cpus     = 1
